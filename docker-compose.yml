services:
  postgres:
    image: postgres:16
    container_name: typeahead-postgres
    environment:
      POSTGRES_DB: typeahead
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typeahead -d typeahead"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
