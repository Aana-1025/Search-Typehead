services:
  postgres:
    image: postgres:16
    container_name: typeahead-postgres
    environment:
      POSTGRES_DB: typeahead
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typeahead -d typeahead"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: typeahead-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
