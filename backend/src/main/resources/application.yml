server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:55432/typeahead
    username: typeahead
    password: typeahead
    hikari:
      initialization-fail-timeout: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    url: jdbc:postgresql://127.0.0.1:55432/typeahead
    user: typeahead
    password: typeahead
    locations: classpath:db/migration
  data:
    redis:
      host: 127.0.0.1
      port: 6379

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

app:
  dataset:
    load: false
    path: ../data/queries.csv
    batch-size: 1000
    prefix-max-length: 50
  cache:
    enabled: true
    ttl-seconds: 300
    virtual-nodes: 100
    logical-nodes:
      - cache-node-a
      - cache-node-b
      - cache-node-c
  batch:
    enabled: true
    flush-interval-ms: 5000
    max-events: 500
    max-drain-events: 5000
